spring:
  application:
    name: cpclaw-server
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/CPClaw?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

cpclaw:
  encryption-key: ${CPC_ENCRYPTION_KEY:}
  storage-root: ${CPC_STORAGE_ROOT:./storage}
