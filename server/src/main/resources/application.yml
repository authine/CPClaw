spring:
  application:
    name: cpclaw-server
  mvc:
    async:
      request-timeout: ${ASYNC_REQUEST_TIMEOUT:180000}
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/CPClaw?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

cpclaw:
  encryption-key: ${CPC_ENCRYPTION_KEY:}
  storage-root: ${CPC_STORAGE_ROOT:./storage}
  conversation:
    stream-timeout-ms: ${CPCLAW_STREAM_TIMEOUT_MS:600000}
  cloudpivot:
    corp-id: ${CPC_CLOUDPIVOT_CORP_ID:dingbb40ac2a2529cb14}
    runtime:
      query:
        collection-request-phrases: [明细, 详情, 详细, 清单, 列表, 展示, 列出, 给我看, 看一下, 有哪些, 都有哪些, 有什么]
        count-page-size: ${CPC_RUNTIME_COUNT_PAGE_SIZE:1}
        list-page-size: ${CPC_RUNTIME_LIST_PAGE_SIZE:10}
        analysis-page-size: ${CPC_RUNTIME_ANALYSIS_PAGE_SIZE:100}
        yearly-page-size: ${CPC_RUNTIME_YEARLY_PAGE_SIZE:200}
        owner-filter-page-size: ${CPC_RUNTIME_OWNER_FILTER_PAGE_SIZE:50}
        filter-fallback-page-size: ${CPC_RUNTIME_FILTER_FALLBACK_PAGE_SIZE:50}
        broad-analysis-page-size: ${CPC_RUNTIME_BROAD_ANALYSIS_PAGE_SIZE:10}
        dimension-probe-page-size: ${CPC_RUNTIME_DIMENSION_PROBE_PAGE_SIZE:200}
        count-record-limit: ${CPC_RUNTIME_COUNT_RECORD_LIMIT:1}
        list-record-limit: ${CPC_RUNTIME_LIST_RECORD_LIMIT:10}
        dimension-record-limit: ${CPC_RUNTIME_DIMENSION_RECORD_LIMIT:20000}
        analysis-record-limit: ${CPC_RUNTIME_ANALYSIS_RECORD_LIMIT:200}
        yearly-record-limit: ${CPC_RUNTIME_YEARLY_RECORD_LIMIT:20000}
        owner-filter-record-limit: ${CPC_RUNTIME_OWNER_FILTER_RECORD_LIMIT:50}
        complete-aggregation-record-limit: ${CPC_RUNTIME_COMPLETE_AGGREGATION_RECORD_LIMIT:20000}
        ranking-record-limit: ${CPC_RUNTIME_RANKING_RECORD_LIMIT:200}
        owner-ranking-record-limit: ${CPC_RUNTIME_OWNER_RANKING_RECORD_LIMIT:20000}
        broad-analysis-record-limit: ${CPC_RUNTIME_BROAD_ANALYSIS_RECORD_LIMIT:10}
        filter-fallback-record-limit: ${CPC_RUNTIME_FILTER_FALLBACK_RECORD_LIMIT:50}
        dimension-probe-min-records: ${CPC_RUNTIME_DIMENSION_PROBE_MIN_RECORDS:100}
        dimension-probe-max-records: ${CPC_RUNTIME_DIMENSION_PROBE_MAX_RECORDS:500}
      connector:
        request-timeout-seconds: ${CPC_RUNTIME_REQUEST_TIMEOUT_SECONDS:15}
        auth-session-ttl-minutes: ${CPC_RUNTIME_AUTH_SESSION_TTL_MINUTES:10}
        max-analysis-records: ${CPC_RUNTIME_MAX_ANALYSIS_RECORDS:20000}
        max-page-size: ${CPC_RUNTIME_MAX_PAGE_SIZE:200}
        max-detail-enrich-records: ${CPC_RUNTIME_MAX_DETAIL_ENRICH_RECORDS:500}
        max-list-detail-records: ${CPC_RUNTIME_MAX_LIST_DETAIL_RECORDS:10}
        detail-enrich-parallelism: ${CPC_RUNTIME_DETAIL_ENRICH_PARALLELISM:16}
        data-item-probe-parallelism: ${CPC_RUNTIME_DATA_ITEM_PROBE_PARALLELISM:8}
        metadata-page-size: ${CPC_RUNTIME_METADATA_PAGE_SIZE:500}
        bulk-query-threshold: ${CPC_RUNTIME_BULK_QUERY_THRESHOLD:50}
        max-runtime-filters: ${CPC_RUNTIME_MAX_FILTERS:8}
      display:
        max-fields: ${CPC_RUNTIME_DISPLAY_MAX_FIELDS:5}
        max-value-length: ${CPC_RUNTIME_DISPLAY_MAX_VALUE_LENGTH:80}
        default-priority: ${CPC_RUNTIME_DISPLAY_DEFAULT_PRIORITY:30}
        nested-value-keys: [name, displayName, label, text, value, cust_fullname, org_name]
        hidden-exact: [id, objectId, dataId, operator]
        hidden-contains: [password, schema, propertyType, displayCode, modifier, sequence, rawJson]
        hidden-label-contains: [编码, 标识, 内部ID, 内部 Id]
        hidden-suffixes: [_id, Id]
        identifier-patterns:
          - '(?i)[0-9a-f]{32}'
          - '(?i)[0-9a-f]{8}-[0-9a-f-]{27,}'
          - '[0-9_]+(?:#[0-9]+)+'
        field-rules:
          - label: 名称
            priority: 0
            exact: [instanceName, name, title]
          - label: 负责人
            priority: 5
            contains: [owner, principal, 负责人]
          - label: 阶段
            priority: 8
            contains: [stage, 阶段]
          - label: 状态
            priority: 6
            contains: [status, state, 状态]
          - label: 金额
            priority: 6
            contains: [amount, money, 金额]
          - label: 客户
            priority: 7
            contains: [customer, 客户]
          - label: 销售组织
            priority: 15
            contains: [sales_org, salesOrg, 销售组织]
          - label: 签约概率
            priority: 10
            contains: [sign_probability, 签约概率]
          - label: 预计签约时间
            priority: 10
            contains: [pre_sign, 预计签约]
          - label: 分类
            priority: 10
            contains: [category, 分类]
          - label: 创建时间
            priority: 20
            contains: [created, 创建时间]
          - label: 更新时间
            priority: 20
            contains: [modified, updated, 更新时间]
  vector:
    enabled: ${CPCLAW_VECTOR_ENABLED:false}
    jdbc-url: ${CPCLAW_VECTOR_JDBC_URL:jdbc:postgresql://localhost:5432/CPClaw}
    username: ${CPCLAW_VECTOR_USERNAME:postgres}
    password: ${CPCLAW_VECTOR_PASSWORD:}
    top-k: ${CPCLAW_VECTOR_TOP_K:20}
    min-similarity: ${CPCLAW_VECTOR_MIN_SIMILARITY:0.62}
  embedding:
    base-url: ${CPCLAW_EMBEDDING_BASE_URL:}
    api-key: ${CPCLAW_EMBEDDING_API_KEY:}
    model: ${CPCLAW_EMBEDDING_MODEL:text-embedding-v4}
